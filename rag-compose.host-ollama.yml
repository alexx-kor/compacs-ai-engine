# RAG v2 without ollama/ollama image (~2 GB pull).
# Ollama must run on the host: ollama serve + ollama pull llama3.2:3b nomic-embed-text
#
# Windows + Docker: Ollama must listen on 0.0.0.0 (not only 127.0.0.1):
#   powershell -ExecutionPolicy Bypass -File scripts/setup-ollama-docker-windows.ps1
#
#   docker compose -f rag-compose.host-ollama.yml up -d --build
#   RAG_GATEWAY_PORT=3090 docker compose -f rag-compose.host-ollama.yml up -d   # if :3080 busy
#
# Ping from host:
#   curl http://localhost:3090/health
#   curl http://localhost:11434/api/tags
# Engine is internal only (rag-engine:8080); use gateway from host.

services:
  rag-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: compacs-rag-engine:2.0
    restart: unless-stopped
    command:
      - python
      - -m
      - uvicorn
      - api.stable:app_stable
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
    env_file:
      - .env.rag
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      STORAGE_BACKEND: ${STORAGE_BACKEND:-json}
      LOCAL_VECTOR_STORE_DIR: /app/data/vectors
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      LLM_FALLBACK_ENABLED: "false"
      EMBEDDING_FALLBACK_ENABLED: "false"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      GATEWAY_TIMEOUT: ${GATEWAY_TIMEOUT:-300}
      OLLAMA_CLIENT_TIMEOUT: ${OLLAMA_CLIENT_TIMEOUT:-300}
      COMPACS_API_KEY: ${COMPACS_API_KEY:-compacs-local-dev-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  rag-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: compacs-rag-gateway:2.0
    restart: unless-stopped
    command:
      - gunicorn
      - wsgi:app
      - -c
      - gunicorn.conf.py
    env_file:
      - .env.rag
    environment:
      RAG_ENGINE_URL: http://rag-engine:8080
      GATEWAY_BIND: 0.0.0.0:3080
      GATEWAY_WORKERS: ${GATEWAY_WORKERS:-4}
      GATEWAY_TIMEOUT: ${GATEWAY_TIMEOUT:-300}
    ports:
      - "${RAG_GATEWAY_PORT:-3080}:3080"
    depends_on:
      rag-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
